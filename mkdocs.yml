site_name: Levelling Up
site_url: https://fabioscantamburlo.github.io
site_description: Turning daily failures into brain EXP.
site_author: Fabio Scantamburlo

theme:
  name: material
  custom_dir: docs/overrides
  icon:
    logo: material/mouse
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Night mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Day mode
  font:
    text: Press Start 2P
    code: Share Tech Mono
  features:
    - navigation.top
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/badges.js
  - js/badge-config.js

hooks:
  - hooks/latest_post.py

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: medium
      post_readtime: true
      post_excerpt: required
      categories_allowed:
        - Tech Deep Dive
        - Tutorials
        - General Speaking

nav:
  - Home: index.md
  - Blog: blog/index.md
  - 🕹 Player Stats: about.md
  - 🗂 Categories:
    - Tech Deep Dive: categories/tech-deep-dive.md
    - Tutorials: categories/tutorials.md
    - General Speaking: categories/general-speaking.md
